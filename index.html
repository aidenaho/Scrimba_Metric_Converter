<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header id="hero">
            <h1 id="title">Metric/Imperial Unit Conversion</h1>
            <input id="amt" value=20>
            <button id="convert-btn">Convert</button>
        </header>
        
        <section id="metrics-container">
            <div class="metric-item" id="length">
                <h1 class="metric-title">Length (Meter/Feet)</h1>
                <p class="metric-details" id="length-el">testing</p>
            </div>
            <div class="metric-item" id="volume">
                <h1 class="metric-title">Volume (Liters/Gallons)</h1>
                <p class="metric-details" id="volume-el">testing</p>
            </div>
            <div class="metric-item" id="mass">
                <h1 class="metric-title">Mass (Kilograms/Pounds)</h1>
                <p class="metric-details" id="mass-el">testing</p>
            </div>
        </section>
        <script src="index.js"></script>
    </body>
</html>
